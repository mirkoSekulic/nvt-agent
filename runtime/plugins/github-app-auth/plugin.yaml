doctor:
  command: /usr/local/lib/nvt-agent/plugins/github-app-auth/github-app-auth.py doctor

exports:
  tools:
    - name: github-app-auth
      command: /usr/local/lib/nvt-agent/plugins/github-app-auth/github-app-auth.py
      description: Generate and validate GitHub App installation tokens
    - name: gh-app
      command: /usr/local/lib/nvt-agent/plugins/github-app-auth/gh-app.py
      description: Run gh with a GitHub App installation token
