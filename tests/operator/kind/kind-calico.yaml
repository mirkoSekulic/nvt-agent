# kind cluster for enforcement smokes: the default kindnet CNI does not
# enforce NetworkPolicy, so the egress-denied assertions require Calico
# (installed by the operator-kind-cluster-enforced Make target).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: 192.168.0.0/16
