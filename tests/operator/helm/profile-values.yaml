agentSchedule:
  template:
    image: runtime:test
    runtimeClassName: kata-vm-isolation
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "2"
        memory: 8Gi
    tolerations:
      - key: purpose
        operator: Equal
        value: nvt-agent
        effect: NoSchedule
    workspace:
      mode: Persistent
      size: 20Gi
      dockerSize: 30Gi
      storageClassName: managed-csi
    agent:
      config:
        plugins: []
  profiles:
    - name: default-codex
      runtime:
        type: codex
        autonomy: trusted-local
        container:
          capabilities:
            add:
              - SYS_PTRACE
      agentRuntimeConfig:
        command: codex
        proxy:
          provider: codex-main
      workspaceInstructions: |
        Follow the administrator-owned repository workflow.
        Keep changes focused and run repository checks.
      egress: mediated
      egressEnforcement: true
      egressTransport: forward-proxy
      egressMaxConcurrentTunnels: 512
      broker:
        grants:
          - provider: codex-main
            repositories: [example/*]
            materialization: placeholder-file
            egressHosts: [chatgpt.com]
          - provider: github-main-app
            repositories: [example/*]
            materialization: header-inject
            egressHosts: [github.com]
            git: true
            preparations:
              - operation: identity
  profileSelection:
    defaultProfile: default-codex
    onNoMatch: useDefault
    rules: []
  workflowProfiles:
    - name: implement-pr
      workspaceInstructions: |
        Implement the change and create a pull request.
    - name: review-pr
      workspaceInstructions: |
        Review the pull request and report findings first.
  producerPolicies:
    - identity: system:serviceaccount:custom-ns:producer
      workflows: [implement-pr, review-pr]
      defaultWorkflow: implement-pr
