{{- if and .Values.rbac.create (eq .Values.submission.mode "direct") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nvt-github-comments-producer.fullname" . }}
  namespace: {{ include "nvt-github-comments-producer.agentRunNamespace" . }}
  labels:
    {{- include "nvt-github-comments-producer.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - nvt.dev
    resources:
      - agentruns
    verbs:
      - get
      - list
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nvt-github-comments-producer.fullname" . }}
  namespace: {{ include "nvt-github-comments-producer.agentRunNamespace" . }}
  labels:
    {{- include "nvt-github-comments-producer.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nvt-github-comments-producer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nvt-github-comments-producer.fullname" . }}
{{- end }}
