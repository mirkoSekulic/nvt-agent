apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nvt-github-comments-producer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvt-github-comments-producer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nvt-github-comments-producer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nvt-github-comments-producer.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "nvt-github-comments-producer.serviceAccountName" . }}
      {{- if ne .Values.submission.mode "direct" }}
      automountServiceAccountToken: false
      {{- end }}
      {{- if and (eq .Values.submission.mode "scheduleAdmission") (eq .Values.submission.admissionMode "profiled") }}
      {{- $expiration := int .Values.submission.tokenExpirationSeconds }}
      {{- if or (lt $expiration 600) (gt $expiration 86400) }}
      {{- fail "submission.tokenExpirationSeconds must be between 600 and 86400" }}
      {{- end }}
      securityContext:
        fsGroup: 65532
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: github-comments-producer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/nvt-github-comments/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/nvt-github-comments
              readOnly: true
            - name: github-app
              mountPath: {{ .Values.githubApp.privateKeyMountPath | quote }}
              readOnly: true
            - name: state
              mountPath: /var/lib/nvt-github-comments
            {{- if and (eq .Values.submission.mode "scheduleAdmission") (eq .Values.submission.admissionMode "profiled") }}
            - name: operator-admission-token
              mountPath: {{ dir .Values.submission.admissionTokenFile | quote }}
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nvt-github-comments-producer.configMapName" . }}
        - name: github-app
          secret:
            secretName: {{ .Values.githubApp.existingSecret | quote }}
            items:
              - key: {{ .Values.githubApp.privateKeyKey | quote }}
                path: {{ .Values.githubApp.privateKeyKey | quote }}
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "nvt-github-comments-producer.stateClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and (eq .Values.submission.mode "scheduleAdmission") (eq .Values.submission.admissionMode "profiled") }}
        - name: operator-admission-token
          projected:
            defaultMode: 0440
            sources:
              - serviceAccountToken:
                  audience: nvt-operator
                  expirationSeconds: {{ int .Values.submission.tokenExpirationSeconds }}
                  path: {{ base .Values.submission.admissionTokenFile | quote }}
        {{- end }}
