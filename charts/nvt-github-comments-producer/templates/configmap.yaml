apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nvt-github-comments-producer.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvt-github-comments-producer.labels" . | nindent 4 }}
data:
  config.yaml: |
    commandPrefixes:
      {{- toYaml .Values.commandPrefixes | nindent 6 }}
    allowedAuthors:
      {{- toYaml .Values.allowedAuthors | nindent 6 }}
    pollInterval: {{ .Values.pollInterval | quote }}
    operatorCallbackBaseURL: {{ .Values.operatorCallbackBaseURL | quote }}
    submission:
      mode: {{ .Values.submission.mode | quote }}
      admissionBaseURL: {{ .Values.submission.admissionBaseURL | quote }}
      scheduleNamespace: {{ default (include "nvt-github-comments-producer.agentRunNamespace" .) .Values.submission.scheduleNamespace | quote }}
      scheduleName: {{ .Values.submission.scheduleName | quote }}
    idempotency:
      scope: {{ .Values.idempotency.scope | quote }}
    state:
      sqlitePath: {{ .Values.state.sqlitePath | quote }}
    repositories:
      {{- toYaml .Values.repositories | nindent 6 }}
    githubApp:
      appID: {{ .Values.githubApp.appID }}
      installationID: {{ .Values.githubApp.installationID }}
      privateKeyPath: {{ include "nvt-github-comments-producer.privateKeyPath" . | quote }}
    agentRun:
      namespace: {{ include "nvt-github-comments-producer.agentRunNamespace" . | quote }}
      runtimeImage: {{ .Values.agentRun.runtimeImage | quote }}
      runtimeType: {{ .Values.agentRun.runtimeType | quote }}
      runtimeAutonomy: {{ .Values.agentRun.runtimeAutonomy | quote }}
      workspaceMode: {{ .Values.agentRun.workspaceMode | quote }}
      {{- with .Values.agentRun.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.agentRun.runtimeAuthSecret }}
      runtimeAuthSecret: {{ . | quote }}
      {{- end }}
      {{- with .Values.agentRun.runtimeAuthMountPath }}
      runtimeAuthMountPath: {{ . | quote }}
      {{- end }}
      {{- $ttl := dict }}
      {{- if kindIs "map" .Values.agentRun.ttl }}
      {{- $ttl = .Values.agentRun.ttl }}
      {{- end }}
      {{- $activeDeadlineSeconds := get $ttl "activeDeadlineSeconds" }}
      {{- $completedTTLSeconds := get $ttl "completedTTLSeconds" }}
      {{- $failedTTLSeconds := get $ttl "failedTTLSeconds" }}
      {{- $runRetentionSeconds := get $ttl "runRetentionSeconds" }}
      {{- $hasActiveDeadlineSeconds := and (hasKey $ttl "activeDeadlineSeconds") (ne $activeDeadlineSeconds nil) }}
      {{- $hasCompletedTTLSeconds := and (hasKey $ttl "completedTTLSeconds") (ne $completedTTLSeconds nil) }}
      {{- $hasFailedTTLSeconds := and (hasKey $ttl "failedTTLSeconds") (ne $failedTTLSeconds nil) }}
      {{- $hasRunRetentionSeconds := and (hasKey $ttl "runRetentionSeconds") (ne $runRetentionSeconds nil) }}
      {{- if or $hasActiveDeadlineSeconds $hasCompletedTTLSeconds $hasFailedTTLSeconds $hasRunRetentionSeconds }}
      ttl:
        {{- if $hasActiveDeadlineSeconds }}
        activeDeadlineSeconds: {{ int64 $activeDeadlineSeconds }}
        {{- end }}
        {{- if $hasCompletedTTLSeconds }}
        completedTTLSeconds: {{ int64 $completedTTLSeconds }}
        {{- end }}
        {{- if $hasFailedTTLSeconds }}
        failedTTLSeconds: {{ int64 $failedTTLSeconds }}
        {{- end }}
        {{- if $hasRunRetentionSeconds }}
        runRetentionSeconds: {{ int64 $runRetentionSeconds }}
        {{- end }}
      {{- end }}
      brokerGrants:
        {{- toYaml .Values.agentRun.brokerGrants | nindent 8 }}
    agentConfig:
      {{- toYaml .Values.agentConfig | nindent 6 }}
