replicaCount: 1

image:
  repository: nvt-github-comments-producer
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

commandPrefixes:
  - /nvtagent

allowedAuthors:
  - "*"

pollInterval: 30s

operatorCallbackBaseURL: http://nvt-operator:8082

submission:
  mode: scheduleAdmission
  admissionBaseURL: http://nvt-operator:8082
  scheduleNamespace: ""
  scheduleName: default

idempotency:
  scope: issue

repositories: []

githubApp:
  appID: 0
  installationID: 0
  existingSecret: nvt-github-app
  privateKeyKey: private-key.pem
  privateKeyMountPath: /var/run/secrets/github-app

state:
  sqlitePath: /var/lib/nvt-github-comments/state.db

agentRun:
  namespace: ""
  runtimeImage: nvt-agent-runtime:latest
  runtimeType: codex
  runtimeAutonomy: trusted-local
  runtimeClassName: ""
  runtimeAuthSecret: ""
  runtimeAuthMountPath: ""
  workspaceMode: Ephemeral
  brokerGrants: []
  ttl:
    activeDeadlineSeconds: null
    completedTTLSeconds: 300
    failedTTLSeconds: 3600
    runRetentionSeconds: 2592000

agentConfig: {}

persistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClass: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
