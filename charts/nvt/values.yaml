namespace:
  name: ""
  create: false

runtime:
  image: nvt-agent-runtime:latest

egress:
  egressdImage: nvt-egressd:latest
  # Cluster default egress mode for AgentRuns created through the nvt
  # admission/schedule path (producers/schedules) that leave spec.egress
  # empty. Applied once, at creation — flipping it never reclassifies an
  # existing run. Default "direct". A raw `kubectl apply` of an AgentRun with
  # empty egress is defaulted to "direct" by the CRD schema regardless of this
  # knob (docs/phase5-6b-observability-pr-plan.md decision 5).
  defaultMode: direct
  # Opt into the per-grant allowInsecureUpstream escape hatch (plaintext
  # upstream leg). Test/dev only, for hermetic in-cluster fixtures that cannot
  # present a publicly-trusted cert. Leave false in any real deployment: a
  # plaintext upstream carrying an injected credential is a conformance
  # failure, and admission rejects the flag unless this is set.
  allowInsecureUpstreams: false

broker:
  enabled: true
  image: nvt-broker:latest
  envSecretName: ""
  tls:
    # Serve the broker over TLS. The egressd->broker leg carries real
    # credentials through the agent's network namespace, so mediated
    # production runs require it (mediated-egress-plan.md §2). When enabled
    # and no existingSecret is given, the chart generates a self-signed CA +
    # serving cert into secretName (preserved across upgrades). The CA cert
    # is public material distributed to egressd and the agent by the operator.
    enabled: true
    secretName: nvt-broker-tls
    existingSecret: ""
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
    existingClaim: ""
    seedSecretName: ""
    seedTargetDir: codex
  config:
    providers: []
  agents:
    agents: []

operator:
  image: nvt-operator:latest
  replicas: 1

gateway:
  enabled: false
  image: nvt-agent-gateway:latest
  replicas: 1
  baseDomain: agents.localhost
  publicURL: ""
  port: 8080
  defaultTargetPort: 4090
  auth:
    mode: none
    session:
      existingSecret: ""
      secretKey: session-secret
      cookieName: nvt_agent_gateway
      cookieDomain: ""
      maxAgeSeconds: 86400
      secure: true
    oidc:
      issuerURL: ""
      clientID: ""
      clientSecret:
        existingSecret: ""
        secretKey: client-secret
      scopes:
        - openid
        - profile
      callbackPath: /oauth2/callback
      acrValues: ""
      validIssuer: ""
      extraAuthParams: {}
      authorizationDetails: ""
    authorization:
      default: deny
      rules: []
  service:
    type: ClusterIP
    port: 80

agentSchedule:
  enabled: true
  name: default
  maxParallelism: 1
  suspend: false
