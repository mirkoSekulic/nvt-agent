namespace:
  name: ""
  create: false

global:
  # Required when installing this source checkout without component tag
  # overrides. Published OCI packages set Chart.AppVersion to this value.
  imageTag: ""

runtime:
  image:
    repository: ghcr.io/mirkosekulic/nvt-agent-runtime
    tag: ""
    pullPolicy: IfNotPresent

egress:
  egressd:
    image:
      repository: ghcr.io/mirkosekulic/nvt-egressd
      tag: ""
      pullPolicy: IfNotPresent
  captured:
    image:
      repository: ghcr.io/mirkosekulic/nvt-captured
      tag: ""
      pullPolicy: IfNotPresent
  networkPolicyCapable: false
  allowedTCPPorts:
    - 80
    - 443
  # Additional deployment Pod, Service, node, cluster, and VNet ranges. The
  # operator always adds its built-in IANA non-public and transition ranges.
  denyCIDRs: []
  # Cluster default egress mode for AgentRuns created through the nvt
  # admission/schedule path (producers/schedules) that leave spec.egress
  # empty. Applied once, at creation — flipping it never reclassifies an
  # existing run. Default "direct". A raw `kubectl apply` of an AgentRun with
  # empty egress is defaulted to "direct" by the CRD schema regardless of this
  # knob (docs/transparent-egress-architecture.md).
  defaultMode: direct
  # Opt into the per-grant allowInsecureUpstream escape hatch (plaintext
  # upstream leg). Test/dev only, for hermetic in-cluster fixtures that cannot
  # present a publicly-trusted cert. Leave false in any real deployment: a
  # plaintext upstream carrying an injected credential is a conformance
  # failure, and admission rejects the flag unless this is set.
  allowInsecureUpstreams: false

broker:
  enabled: true
  image:
    repository: ghcr.io/mirkosekulic/nvt-broker
    tag: ""
    pullPolicy: IfNotPresent
  envSecretName: ""
  tls:
    # Serve the broker over TLS. The egressd->broker leg carries real
    # credentials through the agent's network namespace, so mediated
    # production runs require it (protocol/injection.md). When enabled
    # and no existingSecret is given, the chart generates a self-signed CA +
    # serving cert into secretName (preserved across upgrades). The CA cert
    # is public material distributed to egressd and the agent by the operator.
    enabled: true
    secretName: nvt-broker-tls
    existingSecret: ""
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
    existingClaim: ""
    seedSecretName: ""
    seedTargetDir: codex
  config:
    providers: []
  agents:
    agents: []

operator:
  image:
    repository: ghcr.io/mirkosekulic/nvt-operator
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1

gateway:
  enabled: false
  image:
    repository: ghcr.io/mirkosekulic/nvt-agent-gateway
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  baseDomain: agents.localhost
  publicURL: ""
  routing:
    mode: subdomain
  port: 8080
  defaultTargetPort: 4090
  auth:
    mode: none
    session:
      existingSecret: ""
      secretKey: session-secret
      cookieName: nvt_agent_gateway
      cookieDomain: ""
      maxAgeSeconds: 86400
      secure: true
    oidc:
      issuerURL: ""
      clientID: ""
      clientSecret:
        existingSecret: ""
        secretKey: client-secret
      scopes:
        - openid
        - profile
      callbackPath: /oauth2/callback
      acrValues: ""
      validIssuer: ""
      extraAuthParams: {}
      authorizationDetails: ""
    oauth2:
      credentials:
        existingSecret: ""
        clientIDKey: client-id
        clientSecretKey: client-secret
      callbackPath: /oauth2/callback
      issuer: ""
      authorizationURL: ""
      tokenURL: ""
      scopes: []
      clientAuthMethod: client_secret_post
      identity:
        endpoint: ""
        allowedHosts: []
        subjectPath: ""
        displayNamePath: ""
    # Optional. When set, authenticated principals must match one allow rule
    # before a gateway session is created. AgentRun authorization remains a
    # separate second gate.
    admission: null
    # Provider-neutral bounded OAuth claim lookups performed before admission.
    claimEnrichment:
      allowedHosts: []
      sources: []
    authorization:
      default: deny
      claimSource: id_token
      rules: []
  service:
    type: ClusterIP
    port: 80

agentSchedule:
  enabled: true
  name: default
  maxParallelism: 1
  suspend: false
  # Empty profile fields preserve the legacy full-AgentRun admission contract.
  # See operator/docs/agentschedule.md for a complete profiled example.
  template: {}
  profiles: []
  profileSelection: {}
  allowedProducers: []

producer:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/mirkosekulic/nvt-github-comments-producer
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  commandPrefixes:
    - /nvtagent
  allowedAuthors:
    - "*"
  pollInterval: 30s
  operatorCallbackBaseURL: http://nvt-operator:8082
  submission:
    mode: scheduleAdmission
    # legacy posts a complete AgentRun. profiled posts only work, prompt, and principal facts.
    admissionMode: legacy
    admissionBaseURL: http://nvt-operator:8082
    admissionTokenFile: /var/run/secrets/nvt-operator/token
    tokenExpirationSeconds: 3600
    scheduleNamespace: ""
    scheduleName: default
  idempotency:
    scope: issue
  repositories: []
  githubApp:
    appID: 0
    installationID: 0
    existingSecret: nvt-github-app
    privateKeyKey: private-key.pem
    privateKeyMountPath: /var/run/secrets/github-app
  state:
    sqlitePath: /var/lib/nvt-github-comments/state.db
  agentRun:
    namespace: ""
    # Empty uses runtime.image from this coordinated chart release.
    runtimeImage: ""
    runtimeType: codex
    runtimeAutonomy: trusted-local
    runtimeClassName: ""
    runtimeAuthSecret: ""
    runtimeAuthMountPath: ""
    workspaceMode: Ephemeral
    # Required when workspaceMode is Persistent.
    workspaceSize: ""
    # Empty uses the cluster default StorageClass.
    workspaceStorageClassName: ""
    brokerGrants: []
    ttl:
      activeDeadlineSeconds: null
      completedTTLSeconds: 300
      failedTTLSeconds: 3600
      runRetentionSeconds: 2592000
  agentConfig: {}
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: ""
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true
  podAnnotations: {}
  podLabels: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
