namespace:
  name: ""
  create: false

runtime:
  image: nvt-agent-runtime:latest

broker:
  enabled: true
  image: nvt-broker:latest
  envSecretName: ""
  config:
    providers: []
  agents:
    agents: []

operator:
  image: nvt-operator:latest
  replicas: 1

gateway:
  enabled: false
  image: nvt-agent-gateway:latest
  replicas: 1
  baseDomain: agents.localhost
  port: 8080
  defaultTargetPort: 4090
  auth:
    mode: none
  service:
    type: ClusterIP
    port: 80

agentSchedule:
  enabled: true
  name: default
  maxParallelism: 1
  suspend: false
