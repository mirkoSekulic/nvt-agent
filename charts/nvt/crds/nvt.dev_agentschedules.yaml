apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentschedules.nvt.dev
spec:
  group: nvt.dev
  names:
    kind: AgentSchedule
    listKind: AgentScheduleList
    plural: agentschedules
    singular: agentschedule
    shortNames:
      - asched
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: AgentSchedule represents a generic admission pool for disposable AgentRuns.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                suspend:
                  type: boolean
                maxParallelism:
                  type: integer
                  minimum: 0
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                activeRuns:
                  type: integer
                  minimum: 0
                lastAcceptedAt:
                  type: string
                  format: date-time
                lastRejectedAt:
                  type: string
                  format: date-time
                lastRejectionReason:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Active
          type: integer
          jsonPath: .status.activeRuns
        - name: Max
          type: integer
          jsonPath: .spec.maxParallelism
        - name: Suspended
          type: boolean
          jsonPath: .spec.suspend
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
