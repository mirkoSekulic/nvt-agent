apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentschedules.nvt.dev
spec:
  group: nvt.dev
  names:
    kind: AgentSchedule
    listKind: AgentScheduleList
    plural: agentschedules
    singular: agentschedule
    shortNames:
      - asched
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: AgentSchedule represents a generic admission pool for disposable AgentRuns.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "!(has(self.workflowProfiles) || has(self.producerPolicies)) || (!has(self.allowedProducers) && has(self.workflowProfiles) && has(self.producerPolicies))"
                  message: workflow-enabled schedules require workflowProfiles and producerPolicies and cannot use legacy allowedProducers
              properties:
                suspend:
                  type: boolean
                maxParallelism:
                  type: integer
                  minimum: 0
                allowedProducers:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    minLength: 1
                workflowProfiles:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                      workspaceInstructions:
                        type: string
                        maxLength: 65536
                producerPolicies:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - identity
                    properties:
                      identity:
                        type: string
                        minLength: 1
                      workflows:
                        type: array
                        x-kubernetes-list-type: set
                        items:
                          type: string
                          minLength: 1
                          maxLength: 63
                          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                      defaultWorkflow:
                        type: string
                        minLength: 1
                        maxLength: 63
                        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                template:
                  type: object
                  required:
                    - image
                    - workspace
                    - agent
                  properties:
                    image:
                      type: string
                      minLength: 1
                    runtimeClassName:
                      type: string
                    resources:
                      description: Resources is snapshotted into the generated AgentRun and applied to its agent container.
                      type: object
                      properties:
                        claims:
                          type: array
                          x-kubernetes-list-map-keys:
                            - name
                          x-kubernetes-list-type: map
                          items:
                            type: object
                            required:
                              - name
                            properties:
                              name:
                                type: string
                        limits:
                          type: object
                          additionalProperties:
                            anyOf:
                              - type: integer
                              - type: string
                            pattern: '^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([eE](\\+|-)?[0-9]+)|[numkKMGTPCE]i?)?$'
                            x-kubernetes-int-or-string: true
                        requests:
                          type: object
                          additionalProperties:
                            anyOf:
                              - type: integer
                              - type: string
                            pattern: '^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([eE](\\+|-)?[0-9]+)|[numkKMGTPCE]i?)?$'
                            x-kubernetes-int-or-string: true
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          effect:
                            type: string
                          key:
                            type: string
                          operator:
                            type: string
                          tolerationSeconds:
                            type: integer
                            format: int64
                          value:
                            type: string
                    workspace:
                      type: object
                      x-kubernetes-validations:
                        - rule: "self.mode == 'Persistent' ? has(self.size) : !has(self.size) && !has(self.storageClassName)"
                          message: size is required for Persistent mode and size/storageClassName are forbidden for Ephemeral mode
                        - rule: "!has(self.size) || quantity(string(self.size)).isGreaterThan(quantity('0'))"
                          message: size must be a positive Kubernetes resource quantity
                      properties:
                        mode:
                          type: string
                          default: Ephemeral
                          enum:
                            - Ephemeral
                            - Persistent
                        size:
                          anyOf:
                            - type: integer
                            - type: string
                          pattern: '^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([eE](\+|-)?[0-9]+)|[numkKMGTPCE]i?)?$'
                          x-kubernetes-int-or-string: true
                        storageClassName:
                          type: string
                          maxLength: 253
                          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                    agent:
                      type: object
                      required:
                        - config
                      properties:
                        config:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        workspaceInstructions:
                          type: string
                          maxLength: 65536
                    lifecycle:
                      type: object
                      properties:
                        completeOn:
                          type: array
                          items:
                            type: string
                            minLength: 1
                        failOn:
                          type: array
                          items:
                            type: string
                            minLength: 1
                    ttl:
                      type: object
                      properties:
                        activeDeadlineSeconds:
                          type: integer
                          minimum: 0
                        completedTTLSeconds:
                          type: integer
                          minimum: 0
                        failedTTLSeconds:
                          type: integer
                          minimum: 0
                        runRetentionSeconds:
                          type: integer
                          minimum: 0
                profiles:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    x-kubernetes-validations:
                      - rule: "!has(self.egressForwardProxy)"
                        message: egressForwardProxy is removed; use egressTransport
                    required:
                      - name
                      - runtime
                      - agentRuntimeConfig
                      - egress
                    properties:
                      name:
                        type: string
                        minLength: 1
                      runtime:
                        type: object
                        required:
                          - type
                          - autonomy
                        properties:
                          type:
                            type: string
                            enum:
                              - codex
                              - claude
                          autonomy:
                            type: string
                            enum:
                              - trusted-local
                              - interactive
                          user:
                            type: string
                            default: root
                            enum:
                              - root
                              - non-root
                      runtimeAuth:
                        type: object
                        required:
                          - secretName
                        properties:
                          secretName:
                            type: string
                            minLength: 1
                          mountPath:
                            type: string
                            minLength: 1
                      agentRuntimeConfig:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      workspaceInstructions:
                        type: string
                        maxLength: 65536
                      egress:
                        type: string
                        enum:
                          - direct
                          - mediated
                      egressAllowInsecureBroker:
                        type: boolean
                        default: false
                      egressEnforcement:
                        type: boolean
                        default: false
                      egressForwardProxy:
                        type: boolean
                        description: 'Deprecated: migration tombstone; any presence is rejected. Use egressTransport.'
                      egressTransport:
                        type: string
                        enum:
                          - redirect
                          - forward-proxy
                          - transparent
                      broker:
                        type: object
                        properties:
                          grants:
                            type: array
                            items:
                              type: object
                              required:
                                - provider
                                - repositories
                              properties:
                                provider:
                                  type: string
                                  minLength: 1
                                repositories:
                                  type: array
                                  items:
                                    type: string
                                    minLength: 1
                                preparations:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - operation
                                    properties:
                                      operation:
                                        type: string
                                        enum:
                                          - identity
                                materialization:
                                  type: string
                                  default: file-bundle
                                  enum:
                                    - file-bundle
                                    - header-inject
                                    - placeholder-file
                                egressHosts:
                                  type: array
                                  items:
                                    type: string
                                    minLength: 1
                                git:
                                  type: boolean
                                  default: false
                                allowInsecureUpstream:
                                  type: boolean
                                  default: false
                                permissions:
                                  type: object
                                  additionalProperties:
                                    type: string
                                    enum:
                                      - read
                                      - write
                                quota:
                                  type: object
                                  required:
                                    - requests
                                  properties:
                                    requests:
                                      type: integer
                                      minimum: 1
                profileSelection:
                  type: object
                  required:
                    - onNoMatch
                  properties:
                    defaultProfile:
                      type: string
                      minLength: 1
                    onNoMatch:
                      type: string
                      enum:
                        - useDefault
                        - deny
                    rules:
                      type: array
                      items:
                        type: object
                        required:
                          - issuer
                          - subject
                          - profile
                        properties:
                          issuer:
                            type: string
                            minLength: 1
                          subject:
                            type: string
                            minLength: 1
                          profile:
                            type: string
                            minLength: 1
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                activeRuns:
                  type: integer
                  minimum: 0
                lastAcceptedAt:
                  type: string
                  format: date-time
                lastRejectedAt:
                  type: string
                  format: date-time
                lastRejectionReason:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Active
          type: integer
          jsonPath: .status.activeRuns
        - name: Max
          type: integer
          jsonPath: .spec.maxParallelism
        - name: Suspended
          type: boolean
          jsonPath: .spec.suspend
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
