apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentruns.nvt.dev
spec:
  group: nvt.dev
  names:
    kind: AgentRun
    listKind: AgentRunList
    plural: agentruns
    singular: agentrun
    shortNames:
      - arun
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: AgentRun represents one disposable nvt agent execution.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - runtime
                - image
                - workspace
                - agent
              properties:
                runtime:
                  type: object
                  required:
                    - type
                    - autonomy
                  properties:
                    type:
                      type: string
                      enum:
                        - codex
                        - claude
                    autonomy:
                      type: string
                      enum:
                        - trusted-local
                        - interactive
                runtimeAuth:
                  type: object
                  required:
                    - secretName
                  properties:
                    secretName:
                      type: string
                      minLength: 1
                    mountPath:
                      type: string
                      minLength: 1
                image:
                  type: string
                  minLength: 1
                runtimeClassName:
                  type: string
                egress:
                  type: string
                  default: direct
                  enum:
                    - direct
                    - mediated
                egressAllowInsecureBroker:
                  type: boolean
                  default: false
                workspace:
                  type: object
                  required:
                    - mode
                  properties:
                    mode:
                      type: string
                      enum:
                        - Ephemeral
                broker:
                  type: object
                  properties:
                    grants:
                      type: array
                      items:
                        type: object
                        required:
                          - provider
                          - repositories
                        properties:
                          provider:
                            type: string
                            minLength: 1
                          repositories:
                            type: array
                            items:
                              type: string
                              minLength: 1
                          materialization:
                            type: string
                            default: file-bundle
                            enum:
                              - file-bundle
                              - header-inject
                          egressHosts:
                            type: array
                            items:
                              type: string
                              minLength: 1
                          git:
                            type: boolean
                            default: false
                          permissions:
                            type: object
                            additionalProperties:
                              type: string
                              enum:
                                - read
                                - write
                prompt:
                  type: object
                  properties:
                    text:
                      type: string
                agent:
                  type: object
                  required:
                    - config
                  properties:
                    config:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                lifecycle:
                  type: object
                  properties:
                    completeOn:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    failOn:
                      type: array
                      items:
                        type: string
                        minLength: 1
                ttl:
                  type: object
                  properties:
                    activeDeadlineSeconds:
                      type: integer
                      minimum: 0
                    completedTTLSeconds:
                      type: integer
                      minimum: 0
                    failedTTLSeconds:
                      type: integer
                      minimum: 0
                    runRetentionSeconds:
                      type: integer
                      minimum: 0
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Completed
                    - Failed
                    - DeadlineExceeded
                podName:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                finishedAt:
                  type: string
                  format: date-time
                reason:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime.type
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
