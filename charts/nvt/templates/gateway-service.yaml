{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nvt-agent-gateway
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.gatewayLabels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "nvt.gatewaySelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.port }}
{{- end }}
