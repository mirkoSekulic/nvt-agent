{{- if .Values.agentSchedule.enabled }}
{{- $workflowMode := or (gt (len .Values.agentSchedule.workflowProfiles) 0) (gt (len .Values.agentSchedule.producerPolicies) 0) }}
{{- if and $workflowMode (or (eq (len .Values.agentSchedule.workflowProfiles) 0) (eq (len .Values.agentSchedule.producerPolicies) 0) (gt (len .Values.agentSchedule.allowedProducers) 0)) }}
{{- fail "workflow-enabled agentSchedule requires workflowProfiles and producerPolicies and cannot use legacy allowedProducers" }}
{{- end }}
apiVersion: nvt.dev/v1alpha1
kind: AgentSchedule
metadata:
  name: {{ .Values.agentSchedule.name | quote }}
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.labels" . | nindent 4 }}
spec:
  maxParallelism: {{ .Values.agentSchedule.maxParallelism }}
  suspend: {{ .Values.agentSchedule.suspend }}
  {{- with .Values.agentSchedule.template }}
  {{- $template := deepCopy . }}
  {{- if not (get $template "image") }}
  {{- $_ := set $template "image" (include "nvt.runtimeImage" $) }}
  {{- end }}
  template:
    {{- toYaml $template | nindent 4 }}
  {{- end }}
  {{- with .Values.agentSchedule.profiles }}
  profiles:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.agentSchedule.profileSelection }}
  profileSelection:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.agentSchedule.workflowProfiles }}
  workflowProfiles:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.agentSchedule.producerPolicies }}
  producerPolicies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.agentSchedule.allowedProducers }}
  allowedProducers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
