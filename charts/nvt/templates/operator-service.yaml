apiVersion: v1
kind: Service
metadata:
  name: nvt-operator
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "nvt.operatorSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8082
      targetPort: 8082
