apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvt-operator
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nvt-operator
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
rules:
  - apiGroups: ["nvt.dev"]
    resources: ["agentruns", "agentschedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["nvt.dev"]
    resources: ["agentruns/status", "agentschedules/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["nvt.dev"]
    resources: ["agentruns/finalizers", "agentschedules/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nvt-operator
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nvt-operator
subjects:
  - kind: ServiceAccount
    name: nvt-operator
