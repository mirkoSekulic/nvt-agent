apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvt-operator
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nvt-operator
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
rules:
  - apiGroups: ["nvt.dev"]
    resources: ["agentruns", "agentschedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["nvt.dev"]
    resources: ["agentruns/status", "agentschedules/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["nvt.dev"]
    resources: ["agentruns/finalizers", "agentschedules/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nvt-operator
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nvt-operator
subjects:
  - kind: ServiceAccount
    name: nvt-operator
    namespace: {{ include "nvt.namespace" . | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-tokenreview" (include "nvt.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-tokenreview" (include "nvt.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-tokenreview" (include "nvt.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
subjects:
  - kind: ServiceAccount
    name: nvt-operator
    namespace: {{ include "nvt.namespace" . | quote }}
