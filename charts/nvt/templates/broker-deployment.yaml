{{- if .Values.broker.enabled }}
{{- if and .Values.broker.persistence.seedSecretName (not .Values.broker.persistence.enabled) }}
{{- fail "broker.persistence.seedSecretName requires broker.persistence.enabled=true" }}
{{- end }}
{{- if and .Values.broker.persistence.seedSecretName (or (not (regexMatch `^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)*$` .Values.broker.persistence.seedTargetDir)) (hasPrefix "/" .Values.broker.persistence.seedTargetDir) (contains ".." .Values.broker.persistence.seedTargetDir) (contains `\` .Values.broker.persistence.seedTargetDir)) }}
{{- fail "broker.persistence.seedTargetDir must be a normalized relative path without traversal" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvt-broker
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.brokerLabels" . | nindent 4 }}
spec:
  # nvt-broker is a single writer for provider state under /state; do not scale.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nvt.brokerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # The broker loads its provider config once at startup and does not
        # hot-reload it, so a broker.config change must roll the Deployment.
        checksum/broker-config: {{ include "nvt.brokerConfigChecksum" . | quote }}
        {{- if .Values.broker.tls.enabled }}
        # The broker loads its TLS cert/key once at startup; this checksum
        # restarts it when the TLS Secret material (or name) changes.
        checksum/broker-tls: {{ include "nvt.brokerTLSChecksum" . | quote }}
        {{- end }}
      labels:
        {{- include "nvt.brokerSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: broker
          image: {{ include "nvt.image" (dict "root" . "name" "broker.image" "image" .Values.broker.image) | quote }}
          imagePullPolicy: {{ .Values.broker.image.pullPolicy }}
          {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
          command:
            - /opt/nvt-broker/broker/seed_supervisor.py
            - --
            - /opt/nvt-broker/broker/brokerd.py
          {{- end }}
          ports:
            - name: http
              containerPort: 7347
          env:
            - name: NVT_BROKER_BIND
              value: 0.0.0.0:7347
            - name: NVT_BROKER_CONFIG
              value: /config/broker.yaml
            - name: NVT_BROKER_AGENTS_CONFIG
              value: /config/agents.yaml
            - name: NVT_BROKER_AUDIT_LOG
              value: /state/audit.jsonl
            {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
            - name: NVT_BROKER_SEED_DIR
              value: /seed
            - name: NVT_BROKER_STATE_DIR
              value: /state
            - name: NVT_BROKER_SEED_TARGET_DIR
              value: {{ .Values.broker.persistence.seedTargetDir | quote }}
            {{- end }}
            {{- if .Values.broker.tls.enabled }}
            - name: NVT_BROKER_TLS_CERT
              value: /tls/tls.crt
            - name: NVT_BROKER_TLS_KEY
              value: /tls/tls.key
            {{- end }}
          {{- if .Values.broker.envSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.broker.envSecretName | quote }}
          {{- end }}
          volumeMounts:
            - name: broker-config
              mountPath: /config
              readOnly: true
            - name: broker-state
              mountPath: /state
            {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
            - name: broker-state-seed
              mountPath: /seed
              readOnly: true
            {{- end }}
            {{- if .Values.broker.tls.enabled }}
            - name: broker-tls
              mountPath: /tls
              readOnly: true
            {{- end }}
          {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: {{ ternary "HTTPS" "HTTP" .Values.broker.tls.enabled }}
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 1
          {{- end }}
      volumes:
        {{- if .Values.broker.tls.enabled }}
        - name: broker-tls
          secret:
            secretName: {{ include "nvt.brokerTLSSecretName" . | quote }}
        {{- end }}
        - name: broker-config
          projected:
            sources:
              - configMap:
                  name: nvt-broker-config
                  items:
                    - key: broker.yaml
                      path: broker.yaml
              - configMap:
                  name: nvt-broker-agents
                  items:
                    - key: agents.yaml
                      path: agents.yaml
        - name: broker-state
          {{- if .Values.broker.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default "nvt-broker-state" .Values.broker.persistence.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
        - name: broker-state-seed
          secret:
            secretName: {{ .Values.broker.persistence.seedSecretName | quote }}
            defaultMode: 0400
        {{- end }}
{{- end }}
