{{- if .Values.broker.enabled }}
{{- if and .Values.broker.persistence.seedSecretName (not .Values.broker.persistence.enabled) }}
{{- fail "broker.persistence.seedSecretName requires broker.persistence.enabled=true" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvt-broker
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.brokerLabels" . | nindent 4 }}
spec:
  # nvt-broker is a single writer for provider state under /state; do not scale.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nvt.brokerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nvt.brokerSelectorLabels" . | nindent 8 }}
    spec:
      {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
      initContainers:
        - name: seed-broker-state
          image: {{ .Values.broker.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              target="/state/{{ .Values.broker.persistence.seedTargetDir }}"
              if [ -d "${target}" ] && [ -n "$(find "${target}" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                echo "broker state seed target already exists and is non-empty; leaving existing state unchanged"
                exit 0
              fi
              mkdir -p "${target}"
              for path in /seed/*; do
                [ -e "${path}" ] || continue
                cp -p "${path}" "${target}/$(basename "${path}")"
              done
          volumeMounts:
            - name: broker-state
              mountPath: /state
            - name: broker-state-seed
              mountPath: /seed
              readOnly: true
      {{- end }}
      containers:
        - name: broker
          image: {{ .Values.broker.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7347
          env:
            - name: NVT_BROKER_BIND
              value: 0.0.0.0:7347
            - name: NVT_BROKER_CONFIG
              value: /config/broker.yaml
            - name: NVT_BROKER_AGENTS_CONFIG
              value: /config/agents.yaml
            - name: NVT_BROKER_AUDIT_LOG
              value: /state/audit.jsonl
            {{- if .Values.broker.tls.enabled }}
            - name: NVT_BROKER_TLS_CERT
              value: /tls/tls.crt
            - name: NVT_BROKER_TLS_KEY
              value: /tls/tls.key
            {{- end }}
          {{- if .Values.broker.envSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.broker.envSecretName | quote }}
          {{- end }}
          volumeMounts:
            - name: broker-config
              mountPath: /config
              readOnly: true
            - name: broker-state
              mountPath: /state
            {{- if .Values.broker.tls.enabled }}
            - name: broker-tls
              mountPath: /tls
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.broker.tls.enabled }}
        - name: broker-tls
          secret:
            secretName: {{ default .Values.broker.tls.secretName .Values.broker.tls.existingSecret | quote }}
        {{- end }}
        - name: broker-config
          projected:
            sources:
              - configMap:
                  name: nvt-broker-config
                  items:
                    - key: broker.yaml
                      path: broker.yaml
              - configMap:
                  name: nvt-broker-agents
                  items:
                    - key: agents.yaml
                      path: agents.yaml
        - name: broker-state
          {{- if .Values.broker.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default "nvt-broker-state" .Values.broker.persistence.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and .Values.broker.persistence.enabled .Values.broker.persistence.seedSecretName }}
        - name: broker-state-seed
          secret:
            secretName: {{ .Values.broker.persistence.seedSecretName | quote }}
        {{- end }}
{{- end }}
