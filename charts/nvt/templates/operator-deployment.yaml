apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvt-operator
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.operatorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "nvt.operatorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nvt.operatorSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: nvt-operator
      containers:
        - name: manager
          image: {{ .Values.operator.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --callback-bind-address=:8082
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NVT_EGRESSD_IMAGE
              value: {{ .Values.egress.egressdImage | quote }}
            {{- if and .Values.broker.enabled .Values.broker.tls.enabled }}
            - name: NVT_BROKER_URL
              value: "https://nvt-broker:7347"
            - name: NVT_BROKER_CA_SECRET
              value: {{ default .Values.broker.tls.secretName .Values.broker.tls.existingSecret | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
            - name: http
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
