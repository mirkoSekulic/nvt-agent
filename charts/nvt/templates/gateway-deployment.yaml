{{- if .Values.gateway.enabled }}
{{- if not (has .Values.gateway.routing.mode (list "subdomain" "path")) }}
{{- fail "gateway.routing.mode must be one of subdomain or path" }}
{{- end }}
{{- if and (eq .Values.gateway.routing.mode "subdomain") (not .Values.gateway.baseDomain) }}
{{- fail "gateway.baseDomain is required when gateway.routing.mode=subdomain" }}
{{- end }}
{{- if eq .Values.gateway.routing.mode "path" }}
{{- if not .Values.gateway.publicURL }}
{{- fail "gateway.publicURL is required when gateway.routing.mode=path" }}
{{- end }}
{{- if not (regexMatch `^https://[^/@?#]+(?::[0-9]+)?/?$` .Values.gateway.publicURL) }}
{{- fail "gateway.publicURL must be an absolute HTTPS origin URL when gateway.routing.mode=path" }}
{{- end }}
{{- if and (ne .Values.gateway.auth.mode "none") (not .Values.gateway.auth.session.secure) }}
{{- fail "gateway.auth.session.secure must be true when gateway.routing.mode=path" }}
{{- end }}
{{- if .Values.gateway.auth.session.cookieDomain }}
{{- fail "gateway.auth.session.cookieDomain must be empty when gateway.routing.mode=path" }}
{{- end }}
{{- range $name, $callback := dict "oidc" .Values.gateway.auth.oidc.callbackPath "github" .Values.gateway.auth.github.callbackPath }}
{{- if or (not (hasPrefix "/oauth2/" $callback)) (ne (clean $callback) $callback) (contains "%" $callback) (contains "?" $callback) (contains "#" $callback) }}
{{- fail (printf "gateway.auth.%s.callbackPath must be an unambiguous path below /oauth2/ when gateway.routing.mode=path" $name) }}
{{- end }}
{{- end }}
{{- end }}
{{- if not (has .Values.gateway.auth.mode (list "none" "oidc" "github")) }}
{{- fail "gateway.auth.mode must be one of none, oidc, or github" }}
{{- end }}
{{- if or (eq .Values.gateway.auth.mode "oidc") (eq .Values.gateway.auth.mode "github") }}
{{- if gt (int .Values.gateway.replicas) 1 }}
{{- fail "gateway.replicas must be 1 when gateway authentication is enabled until shared sessions exist" }}
{{- end }}
{{- if not .Values.gateway.auth.session.existingSecret }}
{{- fail "gateway.auth.session.existingSecret is required when gateway authentication is enabled" }}
{{- end }}
{{- end }}
{{- if eq .Values.gateway.auth.mode "oidc" }}
{{- if not .Values.gateway.auth.oidc.clientSecret.existingSecret }}
{{- fail "gateway.auth.oidc.clientSecret.existingSecret is required when gateway.auth.mode=oidc" }}
{{- end }}
{{- if not .Values.gateway.auth.oidc.issuerURL }}
{{- fail "gateway.auth.oidc.issuerURL is required when gateway.auth.mode=oidc" }}
{{- end }}
{{- if not .Values.gateway.auth.oidc.clientID }}
{{- fail "gateway.auth.oidc.clientID is required when gateway.auth.mode=oidc" }}
{{- end }}
{{- end }}
{{- if eq .Values.gateway.auth.mode "github" }}
{{- if not .Values.gateway.auth.github.credentials.existingSecret }}
{{- fail "gateway.auth.github.credentials.existingSecret is required when gateway.auth.mode=github" }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvt-agent-gateway
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.gatewayLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "nvt.gatewaySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nvt.gatewaySelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: nvt-agent-gateway
      containers:
        - name: gateway
          image: {{ include "nvt.image" (dict "root" . "image" .Values.gateway.image) | quote }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - --base-domain={{ .Values.gateway.baseDomain }}
            - --routing-mode={{ .Values.gateway.routing.mode }}
            {{- if .Values.gateway.publicURL }}
            - --public-url={{ .Values.gateway.publicURL }}
            {{- end }}
            - --listen-addr=:{{ .Values.gateway.port }}
            - --default-target-port={{ .Values.gateway.defaultTargetPort }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NVT_GATEWAY_AUTH_MODE
              value: {{ .Values.gateway.auth.mode | quote }}
            {{- if or (eq .Values.gateway.auth.mode "oidc") (eq .Values.gateway.auth.mode "github") }}
            - name: NVT_GATEWAY_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.session.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.session.secretKey | quote }}
            - name: NVT_GATEWAY_SESSION_COOKIE_NAME
              value: {{ .Values.gateway.auth.session.cookieName | quote }}
            - name: NVT_GATEWAY_SESSION_COOKIE_DOMAIN
              value: {{ .Values.gateway.auth.session.cookieDomain | quote }}
            - name: NVT_GATEWAY_SESSION_MAX_AGE_SECONDS
              value: {{ .Values.gateway.auth.session.maxAgeSeconds | quote }}
            - name: NVT_GATEWAY_SESSION_COOKIE_SECURE
              value: {{ .Values.gateway.auth.session.secure | quote }}
            - name: NVT_GATEWAY_AUTHORIZATION
              value: {{ .Values.gateway.auth.authorization | toJson | quote }}
            {{- end }}
            {{- if eq .Values.gateway.auth.mode "oidc" }}
            - name: NVT_GATEWAY_OIDC_ISSUER_URL
              value: {{ .Values.gateway.auth.oidc.issuerURL | quote }}
            - name: NVT_GATEWAY_OIDC_CLIENT_ID
              value: {{ .Values.gateway.auth.oidc.clientID | quote }}
            - name: NVT_GATEWAY_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.oidc.clientSecret.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.oidc.clientSecret.secretKey | quote }}
            - name: NVT_GATEWAY_OIDC_SCOPES
              value: {{ join "," .Values.gateway.auth.oidc.scopes | quote }}
            - name: NVT_GATEWAY_OIDC_CALLBACK_PATH
              value: {{ .Values.gateway.auth.oidc.callbackPath | quote }}
            - name: NVT_GATEWAY_OIDC_ACR_VALUES
              value: {{ .Values.gateway.auth.oidc.acrValues | quote }}
            - name: NVT_GATEWAY_OIDC_VALID_ISSUER
              value: {{ .Values.gateway.auth.oidc.validIssuer | quote }}
            - name: NVT_GATEWAY_OIDC_EXTRA_AUTH_PARAMS
              value: {{ .Values.gateway.auth.oidc.extraAuthParams | toJson | quote }}
            - name: NVT_GATEWAY_OIDC_AUTHORIZATION_DETAILS
              value: {{ .Values.gateway.auth.oidc.authorizationDetails | quote }}
            {{- end }}
            {{- if eq .Values.gateway.auth.mode "github" }}
            - name: NVT_GATEWAY_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.github.credentials.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.github.credentials.clientIDKey | quote }}
            - name: NVT_GATEWAY_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.github.credentials.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.github.credentials.clientSecretKey | quote }}
            - name: NVT_GATEWAY_GITHUB_CALLBACK_PATH
              value: {{ .Values.gateway.auth.github.callbackPath | quote }}
            - name: NVT_GATEWAY_GITHUB_ISSUER
              value: {{ .Values.gateway.auth.github.issuer | quote }}
            - name: NVT_GATEWAY_GITHUB_AUTHORIZATION_URL
              value: {{ .Values.gateway.auth.github.authorizationURL | quote }}
            - name: NVT_GATEWAY_GITHUB_TOKEN_URL
              value: {{ .Values.gateway.auth.github.tokenURL | quote }}
            - name: NVT_GATEWAY_GITHUB_USER_URL
              value: {{ .Values.gateway.auth.github.userURL | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
              {{- if eq .Values.gateway.routing.mode "subdomain" }}
              httpHeaders:
                - name: Host
                  value: {{ .Values.gateway.baseDomain | quote }}
              {{- end }}
          readinessProbe:
            httpGet:
              {{- if eq .Values.gateway.routing.mode "path" }}
              path: /healthz
              {{- else }}
              path: /
              {{- end }}
              port: {{ .Values.gateway.port }}
              {{- if eq .Values.gateway.routing.mode "subdomain" }}
              httpHeaders:
                - name: Host
                  value: {{ .Values.gateway.baseDomain | quote }}
              {{- end }}
{{- end }}
