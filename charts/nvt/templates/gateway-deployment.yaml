{{- if .Values.gateway.enabled }}
{{- $admissionConfigured := ne (toJson .Values.gateway.auth.admission) "null" }}
{{- if not (has .Values.gateway.routing.mode (list "subdomain" "path")) }}
{{- fail "gateway.routing.mode must be one of subdomain or path" }}
{{- end }}
{{- if and (eq .Values.gateway.routing.mode "subdomain") (not .Values.gateway.baseDomain) }}
{{- fail "gateway.baseDomain is required when gateway.routing.mode=subdomain" }}
{{- end }}
{{- if eq .Values.gateway.routing.mode "path" }}
{{- if not .Values.gateway.publicURL }}
{{- fail "gateway.publicURL is required when gateway.routing.mode=path" }}
{{- end }}
{{- if or (not (regexMatch `^https://[^/@?#]+(?::[0-9]+)?(?:/|/[A-Za-z0-9._~-]+(?:/[A-Za-z0-9._~-]+)*)?$` .Values.gateway.publicURL)) (regexMatch `/(?:\.|\.\.)(?:/|$)` .Values.gateway.publicURL) (contains "\\" .Values.gateway.publicURL) (regexMatch `[[:space:]]` .Values.gateway.publicURL) }}
{{- fail "gateway.publicURL must be an absolute HTTPS URL with a canonical optional base path when gateway.routing.mode=path" }}
{{- end }}
{{- if and (ne .Values.gateway.auth.mode "none") (not .Values.gateway.auth.session.secure) }}
{{- fail "gateway.auth.session.secure must be true when gateway.routing.mode=path" }}
{{- end }}
{{- if .Values.gateway.auth.session.cookieDomain }}
{{- fail "gateway.auth.session.cookieDomain must be empty when gateway.routing.mode=path" }}
{{- end }}
{{- range $name, $callback := dict "oidc" .Values.gateway.auth.oidc.callbackPath "oauth2" .Values.gateway.auth.oauth2.callbackPath }}
{{- if or (not (hasPrefix "/oauth2/" $callback)) (ne (clean $callback) $callback) (contains "%" $callback) (contains "?" $callback) (contains "#" $callback) }}
{{- fail (printf "gateway.auth.%s.callbackPath must be an unambiguous path below /oauth2/ when gateway.routing.mode=path" $name) }}
{{- end }}
{{- end }}
{{- end }}
{{- if not (has .Values.gateway.auth.mode (list "none" "oidc" "oauth2")) }}
{{- fail "gateway.auth.mode must be one of none, oidc, or oauth2" }}
{{- end }}
{{- if and (eq .Values.gateway.auth.mode "none") (or $admissionConfigured (gt (len .Values.gateway.auth.claimEnrichment.sources) 0) (gt (len .Values.gateway.auth.claimEnrichment.allowedHosts) 0)) }}
{{- fail "gateway.auth.admission and gateway.auth.claimEnrichment require authentication" }}
{{- end }}
{{- if or (eq .Values.gateway.auth.mode "oidc") (eq .Values.gateway.auth.mode "oauth2") }}
{{- if gt (int .Values.gateway.replicas) 1 }}
{{- fail "gateway.replicas must be 1 when gateway authentication is enabled until shared sessions exist" }}
{{- end }}
{{- if not .Values.gateway.auth.session.existingSecret }}
{{- fail "gateway.auth.session.existingSecret is required when gateway authentication is enabled" }}
{{- end }}
{{- if $admissionConfigured }}
{{- $admission := .Values.gateway.auth.admission }}
{{- if and $admission.default (ne $admission.default "deny") }}
{{- fail "gateway.auth.admission.default must be deny" }}
{{- end }}
{{- range $index, $rule := $admission.rules }}
{{- if $rule.owner }}
{{- fail (printf "gateway.auth.admission.rules[%d].owner is invalid because login admission has no AgentRun" $index) }}
{{- end }}
{{- end }}
{{- end }}
{{- if gt (len .Values.gateway.auth.claimEnrichment.sources) 8 }}
{{- fail "gateway.auth.claimEnrichment.sources must contain at most 8 entries" }}
{{- end }}
{{- if and (gt (len .Values.gateway.auth.claimEnrichment.sources) 0) (eq (len .Values.gateway.auth.claimEnrichment.allowedHosts) 0) }}
{{- fail "gateway.auth.claimEnrichment.allowedHosts is required when sources are configured" }}
{{- end }}
{{- range $index, $source := .Values.gateway.auth.claimEnrichment.sources }}
{{- if not (regexMatch `^https://[^/@?#]+(?::[0-9]+)?(?:/[^?#]*)?$` $source.endpoint) }}
{{- fail (printf "gateway.auth.claimEnrichment.sources[%d].endpoint must be an absolute HTTPS URL without credentials, query, or fragment" $index) }}
{{- end }}
{{- if not (regexMatch `^[a-z][a-z0-9_]{0,63}$` $source.outputClaim) }}
{{- fail (printf "gateway.auth.claimEnrichment.sources[%d].outputClaim must be a safe top-level claim name" $index) }}
{{- end }}
{{- if not $source.valuePath }}
{{- fail (printf "gateway.auth.claimEnrichment.sources[%d].valuePath is required" $index) }}
{{- end }}
{{- end }}
{{- end }}
{{- if eq .Values.gateway.auth.mode "oidc" }}
{{- if not .Values.gateway.auth.oidc.clientSecret.existingSecret }}
{{- fail "gateway.auth.oidc.clientSecret.existingSecret is required when gateway.auth.mode=oidc" }}
{{- end }}
{{- if not .Values.gateway.auth.oidc.issuerURL }}
{{- fail "gateway.auth.oidc.issuerURL is required when gateway.auth.mode=oidc" }}
{{- end }}
{{- if not .Values.gateway.auth.oidc.clientID }}
{{- fail "gateway.auth.oidc.clientID is required when gateway.auth.mode=oidc" }}
{{- end }}
{{- end }}
{{- if eq .Values.gateway.auth.mode "oauth2" }}
{{- if not .Values.gateway.auth.oauth2.credentials.existingSecret }}
{{- fail "gateway.auth.oauth2.credentials.existingSecret is required when gateway.auth.mode=oauth2" }}
{{- end }}
{{- if not (has .Values.gateway.auth.oauth2.clientAuthMethod (list "client_secret_post" "client_secret_basic")) }}
{{- fail "gateway.auth.oauth2.clientAuthMethod must be client_secret_post or client_secret_basic" }}
{{- end }}
{{- $oauth2Callback := .Values.gateway.auth.oauth2.callbackPath }}
{{- if or (not (hasPrefix "/" $oauth2Callback)) (hasPrefix "//" $oauth2Callback) (ne (clean $oauth2Callback) $oauth2Callback) (contains "%" $oauth2Callback) (contains "?" $oauth2Callback) (contains "#" $oauth2Callback) (contains "\\" $oauth2Callback) }}
{{- fail "gateway.auth.oauth2.callbackPath must be an absolute unambiguous path without query or fragment" }}
{{- end }}
{{- if gt (len .Values.gateway.auth.oauth2.scopes) 32 }}
{{- fail "gateway.auth.oauth2.scopes must contain at most 32 entries" }}
{{- end }}
{{- range $index, $scope := .Values.gateway.auth.oauth2.scopes }}
{{- if not (regexMatch `^[^[:space:][:cntrl:]]{1,128}$` $scope) }}
{{- fail (printf "gateway.auth.oauth2.scopes[%d] must be a non-empty bounded OAuth2 scope" $index) }}
{{- end }}
{{- end }}
{{- range $field, $value := dict "issuer" .Values.gateway.auth.oauth2.issuer "authorizationURL" .Values.gateway.auth.oauth2.authorizationURL "tokenURL" .Values.gateway.auth.oauth2.tokenURL "identity.endpoint" .Values.gateway.auth.oauth2.identity.endpoint }}
{{- if not $value }}
{{- fail (printf "gateway.auth.oauth2.%s is required when gateway.auth.mode=oauth2" $field) }}
{{- end }}
{{- if not (regexMatch `^https://[^/@?#]+(?::[0-9]+)?(?:/[^?#]*)?$` $value) }}
{{- fail (printf "gateway.auth.oauth2.%s must be an absolute HTTPS URL without credentials, query, or fragment" $field) }}
{{- end }}
{{- end }}
{{- if eq (len .Values.gateway.auth.oauth2.identity.allowedHosts) 0 }}
{{- fail "gateway.auth.oauth2.identity.allowedHosts is required when gateway.auth.mode=oauth2" }}
{{- end }}
{{- range $index, $host := .Values.gateway.auth.oauth2.identity.allowedHosts }}
{{- if not (regexMatch `^[a-z0-9](?:[a-z0-9.-]*[a-z0-9])?$` $host) }}
{{- fail (printf "gateway.auth.oauth2.identity.allowedHosts[%d] must be a normalized lowercase DNS hostname or IPv4 address without a port" $index) }}
{{- end }}
{{- end }}
{{- $identityHostAllowed := false }}
{{- range $host := .Values.gateway.auth.oauth2.identity.allowedHosts }}
{{- if regexMatch (printf `^https://%s(?::[0-9]+)?(?:/|$)` (regexQuoteMeta $host)) $.Values.gateway.auth.oauth2.identity.endpoint }}
{{- $identityHostAllowed = true }}
{{- end }}
{{- end }}
{{- if not $identityHostAllowed }}
{{- fail "gateway.auth.oauth2.identity.endpoint host is not allowed" }}
{{- end }}
{{- if not .Values.gateway.auth.oauth2.identity.subjectPath }}
{{- fail "gateway.auth.oauth2.identity.subjectPath is required when gateway.auth.mode=oauth2" }}
{{- end }}
{{- range $field, $path := dict "subjectPath" .Values.gateway.auth.oauth2.identity.subjectPath "displayNamePath" .Values.gateway.auth.oauth2.identity.displayNamePath }}
{{- if and $path (not (regexMatch `^[A-Za-z_][A-Za-z0-9_-]*(?:\[\])?(?:\.[A-Za-z_][A-Za-z0-9_-]*(?:\[\])?)*$` $path)) }}
{{- fail (printf "gateway.auth.oauth2.identity.%s must be a safe JSON path" $field) }}
{{- end }}
{{- if and $path (regexMatch `(?i)(token|secret|password|credential|authorization)` $path) }}
{{- fail (printf "gateway.auth.oauth2.identity.%s must be a non-sensitive JSON path" $field) }}
{{- end }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvt-agent-gateway
  namespace: {{ include "nvt.namespace" . | quote }}
  labels:
    {{- include "nvt.gatewayLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "nvt.gatewaySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nvt.gatewaySelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: nvt-agent-gateway
      containers:
        - name: gateway
          image: {{ include "nvt.image" (dict "root" . "name" "gateway.image" "image" .Values.gateway.image) | quote }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - --base-domain={{ .Values.gateway.baseDomain }}
            - --routing-mode={{ .Values.gateway.routing.mode }}
            {{- if .Values.gateway.publicURL }}
            - --public-url={{ .Values.gateway.publicURL }}
            {{- end }}
            - --listen-addr=:{{ .Values.gateway.port }}
            - --default-target-port={{ .Values.gateway.defaultTargetPort }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NVT_GATEWAY_AUTH_MODE
              value: {{ .Values.gateway.auth.mode | quote }}
            {{- if or (eq .Values.gateway.auth.mode "oidc") (eq .Values.gateway.auth.mode "oauth2") }}
            - name: NVT_GATEWAY_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.session.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.session.secretKey | quote }}
            - name: NVT_GATEWAY_SESSION_COOKIE_NAME
              value: {{ .Values.gateway.auth.session.cookieName | quote }}
            - name: NVT_GATEWAY_SESSION_COOKIE_DOMAIN
              value: {{ .Values.gateway.auth.session.cookieDomain | quote }}
            - name: NVT_GATEWAY_SESSION_MAX_AGE_SECONDS
              value: {{ .Values.gateway.auth.session.maxAgeSeconds | quote }}
            - name: NVT_GATEWAY_SESSION_COOKIE_SECURE
              value: {{ .Values.gateway.auth.session.secure | quote }}
            - name: NVT_GATEWAY_AUTHORIZATION
              value: {{ .Values.gateway.auth.authorization | toJson | quote }}
            {{- if $admissionConfigured }}
            - name: NVT_GATEWAY_ADMISSION
              value: {{ .Values.gateway.auth.admission | toJson | quote }}
            {{- end }}
            - name: NVT_GATEWAY_CLAIM_ENRICHMENT
              value: {{ .Values.gateway.auth.claimEnrichment | toJson | quote }}
            {{- end }}
            {{- if eq .Values.gateway.auth.mode "oidc" }}
            - name: NVT_GATEWAY_OIDC_ISSUER_URL
              value: {{ .Values.gateway.auth.oidc.issuerURL | quote }}
            - name: NVT_GATEWAY_OIDC_CLIENT_ID
              value: {{ .Values.gateway.auth.oidc.clientID | quote }}
            - name: NVT_GATEWAY_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.oidc.clientSecret.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.oidc.clientSecret.secretKey | quote }}
            - name: NVT_GATEWAY_OIDC_SCOPES
              value: {{ join "," .Values.gateway.auth.oidc.scopes | quote }}
            - name: NVT_GATEWAY_OIDC_CALLBACK_PATH
              value: {{ .Values.gateway.auth.oidc.callbackPath | quote }}
            - name: NVT_GATEWAY_OIDC_ACR_VALUES
              value: {{ .Values.gateway.auth.oidc.acrValues | quote }}
            - name: NVT_GATEWAY_OIDC_VALID_ISSUER
              value: {{ .Values.gateway.auth.oidc.validIssuer | quote }}
            - name: NVT_GATEWAY_OIDC_EXTRA_AUTH_PARAMS
              value: {{ .Values.gateway.auth.oidc.extraAuthParams | toJson | quote }}
            - name: NVT_GATEWAY_OIDC_AUTHORIZATION_DETAILS
              value: {{ .Values.gateway.auth.oidc.authorizationDetails | quote }}
            {{- end }}
            {{- if eq .Values.gateway.auth.mode "oauth2" }}
            - name: NVT_GATEWAY_OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.oauth2.credentials.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.oauth2.credentials.clientIDKey | quote }}
            - name: NVT_GATEWAY_OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.auth.oauth2.credentials.existingSecret | quote }}
                  key: {{ .Values.gateway.auth.oauth2.credentials.clientSecretKey | quote }}
            - name: NVT_GATEWAY_OAUTH2_CALLBACK_PATH
              value: {{ .Values.gateway.auth.oauth2.callbackPath | quote }}
            - name: NVT_GATEWAY_OAUTH2_ISSUER
              value: {{ .Values.gateway.auth.oauth2.issuer | quote }}
            - name: NVT_GATEWAY_OAUTH2_AUTHORIZATION_URL
              value: {{ .Values.gateway.auth.oauth2.authorizationURL | quote }}
            - name: NVT_GATEWAY_OAUTH2_TOKEN_URL
              value: {{ .Values.gateway.auth.oauth2.tokenURL | quote }}
            - name: NVT_GATEWAY_OAUTH2_SCOPES
              value: {{ join "," .Values.gateway.auth.oauth2.scopes | quote }}
            - name: NVT_GATEWAY_OAUTH2_CLIENT_AUTH_METHOD
              value: {{ .Values.gateway.auth.oauth2.clientAuthMethod | quote }}
            - name: NVT_GATEWAY_OAUTH2_IDENTITY_ENDPOINT
              value: {{ .Values.gateway.auth.oauth2.identity.endpoint | quote }}
            - name: NVT_GATEWAY_OAUTH2_IDENTITY_ALLOWED_HOSTS
              value: {{ join "," .Values.gateway.auth.oauth2.identity.allowedHosts | quote }}
            - name: NVT_GATEWAY_OAUTH2_IDENTITY_SUBJECT_PATH
              value: {{ .Values.gateway.auth.oauth2.identity.subjectPath | quote }}
            - name: NVT_GATEWAY_OAUTH2_IDENTITY_DISPLAY_NAME_PATH
              value: {{ .Values.gateway.auth.oauth2.identity.displayNamePath | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
              {{- if eq .Values.gateway.routing.mode "subdomain" }}
              httpHeaders:
                - name: Host
                  value: {{ .Values.gateway.baseDomain | quote }}
              {{- end }}
          readinessProbe:
            httpGet:
              {{- if eq .Values.gateway.routing.mode "path" }}
              path: /healthz
              {{- else }}
              path: /
              {{- end }}
              port: {{ .Values.gateway.port }}
              {{- if eq .Values.gateway.routing.mode "subdomain" }}
              httpHeaders:
                - name: Host
                  value: {{ .Values.gateway.baseDomain | quote }}
              {{- end }}
{{- end }}
