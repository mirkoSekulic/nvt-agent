services:
  agent:
    image: nvt-agent-runtime:latest
    env_file:
      - ${AGENT_ENV_FILE}
    environment:
      DOCKER_HOST: tcp://127.0.0.1:2375
    working_dir: ${NVT_WORKSPACE}
    depends_on:
      docker:
        condition: service_healthy
    network_mode: service:docker
    volumes:
      - ${WORKSPACE_DIR}:${NVT_WORKSPACE}
      - ${CUSTOM_PLUGINS_DIR}:/custom-plugins
      - ${AGENT_CONFIG_FILE}:${NVT_AGENT_CONFIG_FILE}:ro
      - ${CODEX_CONFIG_DIR}:/root/.codex
      - ${CLAUDE_CONFIG_DIR}:/root/.claude
      - agent-home:/root
      # ca.crt only; the CA private key never leaves egressd process memory.
      - egress-ca:/nvt-egress-ca:ro

  egressd:
    image: nvt-egressd:latest
    profiles:
      - mediated
    env_file:
      - ${EGRESSD_ENV_FILE:-/dev/null}
    environment:
      NVT_EGRESSD_CONFIG: /config/egressd.json
    volumes:
      - ${EGRESSD_CONFIG_FILE:-/dev/null}:/config/egressd.json:ro
      - egress-ca:/nvt-egress-ca
    network_mode: service:docker
    depends_on:
      docker:
        condition: service_healthy

  docker:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - dockerd
      - --host=unix:///var/run/docker.sock
      - --host=tcp://127.0.0.1:2375
      - --tls=false
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - docker-data:/var/lib/docker
      - ${WORKSPACE_DIR}:${NVT_WORKSPACE}
    networks:
      - agents-proxy
      - agent-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=agents-proxy
      - traefik.http.routers.${AGENT_NAME}.rule=Host(`${AGENT_HOST}`)
      - traefik.http.routers.${AGENT_NAME}.entrypoints=web
      - traefik.http.routers.${AGENT_NAME}.service=${AGENT_NAME}
      - traefik.http.services.${AGENT_NAME}.loadbalancer.server.port=4090

volumes:
  agent-home:
  docker-data:
  egress-ca:

networks:
  agents-proxy:
    external: true
  agent-internal:
