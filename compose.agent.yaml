services:
  agent:
    image: nvt-agent-runtime:latest
    # Default is root (0:0, HOME=/root) — unchanged. Non-root mode
    # (AGENT_RUN_USER=1000:1000, AGENT_HOME=/home/agent) is rendered by
    # agent-init --user non-root. The image ships the `agent` user at 1000, and
    # a fresh agent-home named volume inherits its /home/agent ownership.
    user: ${AGENT_RUN_USER:-0:0}
    env_file:
      - ${AGENT_ENV_FILE}
    environment:
      DOCKER_HOST: tcp://127.0.0.1:2375
      HOME: ${AGENT_HOME:-/root}
      NVT_STATE_DIR: ${AGENT_HOME:-/root}/.nvt-agent
      # The env file keeps these as host paths for compose volume
      # interpolation. Inside the container, tools must see container paths.
      CODEX_CONFIG_DIR: ${AGENT_HOME:-/root}/.codex
      CLAUDE_CONFIG_DIR: ${AGENT_HOME:-/root}/.claude
    working_dir: ${NVT_WORKSPACE}
    depends_on:
      docker:
        condition: service_healthy
      net-init:
        condition: service_completed_successfully
        required: false
    network_mode: service:docker
    volumes:
      - ${WORKSPACE_DIR}:${NVT_WORKSPACE}
      - ${CUSTOM_PLUGINS_DIR}:/custom-plugins
      - ${AGENT_CONFIG_FILE}:${NVT_AGENT_CONFIG_FILE}:ro
      - ${CODEX_CONFIG_DIR}:${AGENT_HOME:-/root}/.codex
      - ${CLAUDE_CONFIG_DIR}:${AGENT_HOME:-/root}/.claude
      - agent-home:${AGENT_HOME:-/root}
      # ca.crt only; the CA private key is mounted only into egressd.
      - ${EGRESS_CA_CERT_FILE:-/dev/null}:/nvt-egress-ca/ca.crt:ro

  egressd:
    image: nvt-egressd:latest
    # Local compose runs this trusted sidecar as root so a bind-mounted
    # ca.key can stay 0600 instead of becoming group/world-readable. The
    # agent container still receives only ca.crt.
    user: "0:0"
    profiles:
      - mediated
    env_file:
      - ${EGRESSD_ENV_FILE:-/dev/null}
    environment:
      NVT_EGRESSD_CONFIG: /config/egressd.json
    volumes:
      - ${EGRESSD_CONFIG_FILE:-/dev/null}:/config/egressd.json:ro
      - ${EGRESS_CA_CERT_FILE:-/dev/null}:/etc/nvt-egress-ca/ca.crt:ro
      - ${EGRESS_CA_KEY_FILE:-/dev/null}:/etc/nvt-egress-ca/ca.key:ro
    networks:
      - agents-proxy
      - agent-internal
      - egress-private

  captured:
    image: nvt-captured:latest
    profiles:
      - mediated
    network_mode: service:docker
    environment:
      NVT_CAPTURED_EXPLICIT_LISTEN: "[::]:15002"
      NVT_CAPTURED_TRANSPARENT_LISTEN: "[::]:15001"
      NVT_EGRESS_PROXY: egressd:8470
    depends_on:
      egressd:
        condition: service_started

  net-init:
    image: nvt-dind:latest
    profiles:
      - mediated
    network_mode: service:docker
    user: "0:0"
    cap_add:
      - NET_ADMIN
    environment:
      NVT_CAPTURE_EXCLUDE_HOSTS: broker
    depends_on:
      docker:
        condition: service_healthy
      captured:
        condition: service_started
    entrypoint:
      - sh
      - -ec
    command:
      - |
        exclude_v4=""
        exclude_v6=""
        for host in $$NVT_CAPTURE_EXCLUDE_HOSTS; do
          for ip in $$(getent ahosts "$$host" | awk '{print $$1}' | sort -u); do
            case "$$ip" in *:*) exclude_v6="$$exclude_v6 $$ip" ;; *) exclude_v4="$$exclude_v4 $$ip" ;; esac
          done
        done
        iptables -t nat -N NVT_CAPTURE 2>/dev/null || iptables -t nat -F NVT_CAPTURE
        iptables -t nat -A NVT_CAPTURE -d 127.0.0.0/8 -j RETURN
        for ip in $$exclude_v4; do iptables -t nat -A NVT_CAPTURE -d "$$ip/32" -j RETURN; done
        iptables -t nat -A NVT_CAPTURE -m owner --uid-owner 65532 -j RETURN
        iptables -t nat -A NVT_CAPTURE -o docker0 -j RETURN
        iptables -t nat -A NVT_CAPTURE -o br-+ -j RETURN
        iptables -t nat -A NVT_CAPTURE -p tcp -j REDIRECT --to-ports 15001
        iptables -t nat -C OUTPUT -j NVT_CAPTURE 2>/dev/null || iptables -t nat -I OUTPUT 1 -j NVT_CAPTURE
        iptables -t nat -N NVT_DIND 2>/dev/null || iptables -t nat -F NVT_DIND
        nft add rule ip nat NVT_DIND iifname "docker0" fib daddr oifname "docker0" counter return
        nft add rule ip nat NVT_DIND iifname "br-*" fib daddr oifname "br-*" counter return
        iptables -t nat -A NVT_DIND -i docker0 -p tcp -j REDIRECT --to-ports 15001
        iptables -t nat -A NVT_DIND -i br-+ -p tcp -j REDIRECT --to-ports 15001
        iptables -t nat -C PREROUTING -j NVT_DIND 2>/dev/null || iptables -t nat -I PREROUTING 1 -j NVT_DIND
        ip6tables -t nat -N NVT_CAPTURE 2>/dev/null || ip6tables -t nat -F NVT_CAPTURE
        ip6tables -t nat -A NVT_CAPTURE -d ::1/128 -j RETURN
        for ip in $$exclude_v6; do ip6tables -t nat -A NVT_CAPTURE -d "$$ip/128" -j RETURN; done
        ip6tables -t nat -A NVT_CAPTURE -m owner --uid-owner 65532 -j RETURN
        ip6tables -t nat -A NVT_CAPTURE -o docker0 -j RETURN
        ip6tables -t nat -A NVT_CAPTURE -o br-+ -j RETURN
        ip6tables -t nat -A NVT_CAPTURE -p tcp -j REDIRECT --to-ports 15001
        ip6tables -t nat -C OUTPUT -j NVT_CAPTURE 2>/dev/null || ip6tables -t nat -I OUTPUT 1 -j NVT_CAPTURE
        ip6tables -t nat -N NVT_DIND 2>/dev/null || ip6tables -t nat -F NVT_DIND
        nft add rule ip6 nat NVT_DIND iifname "docker0" fib daddr oifname "docker0" counter return
        nft add rule ip6 nat NVT_DIND iifname "br-*" fib daddr oifname "br-*" counter return
        ip6tables -t nat -A NVT_DIND -i docker0 -p tcp -j REDIRECT --to-ports 15001
        ip6tables -t nat -A NVT_DIND -i br-+ -p tcp -j REDIRECT --to-ports 15001
        ip6tables -t nat -C PREROUTING -j NVT_DIND 2>/dev/null || ip6tables -t nat -I PREROUTING 1 -j NVT_DIND

  docker:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - dockerd
      - --host=unix:///var/run/docker.sock
      - --host=tcp://127.0.0.1:2375
      - --tls=false
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - docker-data:/var/lib/docker
      - ${WORKSPACE_DIR}:${NVT_WORKSPACE}
    networks:
      - agents-proxy
      - agent-internal
      - egress-private
    labels:
      - traefik.enable=true
      - traefik.docker.network=agents-proxy
      - traefik.http.routers.${AGENT_NAME}.rule=Host(`${AGENT_HOST}`)
      - traefik.http.routers.${AGENT_NAME}.entrypoints=web
      - traefik.http.routers.${AGENT_NAME}.service=${AGENT_NAME}
      - traefik.http.services.${AGENT_NAME}.loadbalancer.server.port=4090

volumes:
  agent-home:
  docker-data:

networks:
  agents-proxy:
    external: true
  agent-internal:
  egress-private:
    internal: true
