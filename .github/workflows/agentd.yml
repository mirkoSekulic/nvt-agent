name: agentd

on:
  push:
    paths:
      - "runtime/agentd/**"
      - "runtime/core/prompt-agent.sh"
      - "protocol/**"
      - "tests/agentd/**"
      - ".github/workflows/agentd.yml"
  pull_request:
    paths:
      - "runtime/agentd/**"
      - "runtime/core/prompt-agent.sh"
      - "protocol/**"
      - "tests/agentd/**"
      - ".github/workflows/agentd.yml"

jobs:
  conformance:
    runs-on: ubuntu-latest
    env:
      TERM: screen
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run agentd conformance suite
        working-directory: tests/agentd
        env:
          AGENTD_BIN: python3 ${{ github.workspace }}/runtime/agentd/agentd.py
          AGENTDCTL_BIN: python3 ${{ github.workspace }}/runtime/agentd/agentdctl.py
          PROMPT_AGENT_BIN: bash ${{ github.workspace }}/runtime/core/prompt-agent.sh
        run: go test -v ./...
