name: coordinated release

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/charts.yml"
      - ".github/scripts/chart-version-exists.sh"
      - ".github/scripts/release-*.sh"
      - "tests/operator/helm/**"
  push:
    branches:
      - main
    paths:
      - "charts/nvt/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Validate coordinated chart release
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          eval "$(bash .github/scripts/release-metadata.sh charts/nvt "${HEAD_SHA}")"
          merge_base="$(git merge-base "${BASE_SHA}" "${HEAD_SHA}")"
          if ! git diff --quiet "${merge_base}" "${HEAD_SHA}" -- charts/nvt; then
            previous_version="$(git show "${merge_base}:charts/nvt/Chart.yaml" | awk -F ': *' '/^version:/ { gsub(/"/, "", $2); print $2; exit }')"
            if [[ "${VERSION}" == "${previous_version}" ]]; then
              echo "::error file=charts/nvt/Chart.yaml::charts/nvt changed without a chart version bump (${VERSION})"
              exit 1
            fi
            if bash .github/scripts/chart-version-exists.sh \
              "${GITHUB_REPOSITORY_OWNER}" nvt "${VERSION}"; then
              echo "::error file=charts/nvt/Chart.yaml::chart version ${VERSION} is already published"
              exit 1
            else
              status=$?
              [[ "${status}" == "1" ]] || exit "${status}"
            fi
          fi
          helm lint charts/nvt
          mkdir -p dist
          helm package charts/nvt --app-version "${RELEASE_TAG}" --destination dist
          bash .github/scripts/release-scripts-test.sh
          bash tests/operator/helm/test.sh

  release_metadata:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      revision: ${{ steps.release.outputs.revision }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: release
        name: Derive the coordinated release identity
        run: |
          set -euo pipefail
          eval "$(bash .github/scripts/release-metadata.sh charts/nvt "${GITHUB_SHA}")"
          printf 'version=%s\n' "${VERSION}" >>"${GITHUB_OUTPUT}"
          printf 'revision=%s\n' "${REVISION}" >>"${GITHUB_OUTPUT}"
          printf 'release_tag=%s\n' "${RELEASE_TAG}" >>"${GITHUB_OUTPUT}"

  publish:
    needs: release_metadata
    if: needs.release_metadata.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      # Distinct chart versions use distinct groups and therefore cannot evict
      # one another from GitHub's single-pending default queue. Duplicate
      # attempts for one immutable version remain serialized.
      group: nvt-coordinated-release-${{ needs.release_metadata.outputs.version }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.release_metadata.outputs.version }}
      REVISION: ${{ needs.release_metadata.outputs.revision }}
      RELEASE_TAG: ${{ needs.release_metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
          printf '%s' "${GHCR_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
      - name: Preflight chart version immutability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if bash .github/scripts/chart-version-exists.sh "${owner}" nvt "${VERSION}"; then
            mkdir -p preflight/dist preflight/expected preflight/published
            helm package charts/nvt --app-version "${RELEASE_TAG}" --destination preflight/dist
            tar -xzf "preflight/dist/nvt-${VERSION}.tgz" -C preflight/expected
            helm pull "oci://ghcr.io/${owner}/helm/nvt" --version "${VERSION}" --untar --untardir preflight/published
            if ! diff -ru preflight/expected/nvt preflight/published/nvt; then
              echo "::error::conflicting immutable Helm chart version nvt:${VERSION}"
              exit 1
            fi
          else
            status=$?
            [[ "${status}" == "1" ]] || exit "${status}"
          fi
      - name: Publish and verify coordinated images
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          bash .github/scripts/release-images.sh \
            "${owner}" "${RELEASE_TAG}" "${REVISION}" "https://github.com/${GITHUB_REPOSITORY}"
      - name: Verify anonymous image pullability
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          bash .github/scripts/verify-public-images.sh "${owner}" "${RELEASE_TAG}"
      - name: Publish the chart last
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repository="ghcr.io/${owner}/helm"
          mkdir -p dist expected published
          helm lint charts/nvt
          helm package charts/nvt --app-version "${RELEASE_TAG}" --destination dist
          package="dist/nvt-${VERSION}.tgz"

          if bash .github/scripts/chart-version-exists.sh "${owner}" nvt "${VERSION}"; then
            tar -xzf "${package}" -C expected
            helm pull "oci://${repository}/nvt" --version "${VERSION}" --untar --untardir published
            if ! diff -ru expected/nvt published/nvt; then
              echo "::error::conflicting immutable Helm chart version nvt:${VERSION}"
              exit 1
            fi
            echo "Verified existing nvt:${VERSION}; chart publication is already complete."
            exit 0
          else
            status=$?
            [[ "${status}" == "1" ]] || exit "${status}"
          fi

          # The image steps have verified coordinated metadata and anonymous
          # manifest access for all eight release tags.
          helm push "${package}" "oci://${repository}"
