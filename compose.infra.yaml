services:
  broker:
    image: nvt-broker:latest
    env_file:
      - .broker/env
    environment:
      NVT_BROKER_CONFIG: /state/broker.yaml
      NVT_BROKER_AGENTS_CONFIG: /state/agents.yaml
      NVT_BROKER_AUDIT_LOG: /state/audit.jsonl
      NVT_BROKER_BIND: 0.0.0.0:7347
    volumes:
      - ./.broker:/state
    networks:
      - agents-proxy
    restart: unless-stopped

  proxy:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=agents-proxy
      - --entrypoints.web.address=:80
    ports:
      - "127.0.0.1:${NVT_PROXY_PORT:-4090}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agents-proxy

networks:
  agents-proxy:
    external: true
